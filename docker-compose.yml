services:
  # База данных
  user-db:
    image: postgres:18-alpine
    container_name: users-db
    environment:
      POSTGRES_DB: users-db
      POSTGRES_USER: user_postgres_username
      POSTGRES_PASSWORD: user_postgres_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_postgres_username -d users-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Наш сервис пользователей
  user-service:
    build:
      context: .
      dockerfile: service/user-service/Dockerfile
    container_name: user-service
    ports:
      - "8080:8080"
    environment:
      # Переопределяем настройки из application.properties для докера
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/users-db
      SPRING_DATASOURCE_USERNAME: user_postgres_username
      SPRING_DATASOURCE_PASSWORD: user_postgres_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    depends_on:
      user-db:
        condition: service_healthy # Ждем, пока база будет готова принимать соединения